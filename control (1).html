<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNKT Bot Control</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7fff6e;
    --accent2: #ff6e7f;
    --accent3: #6e9fff;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 24px;
  }

  .grid-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(127,255,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127,255,110,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  h1 span { color: var(--accent); }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 13px;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
  .dot.off { background: var(--accent2); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* URL config */
  .url-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex; gap: 12px; align-items: center;
  }

  .url-bar label { color: var(--muted); font-size: 12px; white-space: nowrap; }

  .url-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 6px;
    outline: none;
  }

  .url-bar input:focus { border-color: var(--accent3); }

  /* Cards grid */
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .card-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .card-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  .card-value.green { color: var(--accent); }
  .card-value.red { color: var(--accent2); }
  .card-value.blue { color: var(--accent3); }

  /* Main panels */
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .panel h2 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }
  .field input:disabled { opacity: 0.4; }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }

  button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-start {
    background: var(--accent);
    color: #0a0a0f;
  }
  .btn-start:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-start:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-stop {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
  }
  .btn-stop:hover { background: var(--accent2); color: #0a0a0f; }
  .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    font-size: 12px;
    flex: none;
  }
  .btn-refresh:hover { border-color: var(--accent3); color: var(--accent3); }

  /* Log panel */
  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .log-header h2 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }

  .log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    height: 220px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.8;
  }

  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-track { background: var(--bg); }
  .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line { color: var(--muted); }
  .log-line.compra { color: var(--accent); }
  .log-line.venta { color: var(--accent2); }
  .log-line.error { color: var(--accent2); }
  .log-line.info { color: var(--accent3); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    z-index: 100;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok { border-color: var(--accent); color: var(--accent); }
  .toast.err { border-color: var(--accent2); color: var(--accent2); }

  .wallet-addr {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  .login-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    width: 320px;
    text-align: center;
  }

  .login-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .login-box p { color: var(--muted); font-size: 12px; margin-bottom: 24px; }

  .login-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 12px;
    border-radius: 8px;
    outline: none;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 2px;
  }

  .login-box input:focus { border-color: var(--accent); }

  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #0a0a0f;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-login:hover { filter: brightness(1.1); }
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>CNKT <span style="color:var(--accent)">Bot</span></h2>
    <p>Ingresa tu contraseña para continuar</p>
    <input type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="btn-login" onclick="doLogin()">ENTRAR</button>
    <div id="loginError" style="color:var(--accent2);font-size:12px;margin-top:12px;"></div>
  </div>
</div>

<div class="container" id="mainApp" style="display:none">

  <header>
    <h1>CNKT <span>Bot</span></h1>
    <div class="status-pill">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Desconectado</span>
    </div>
  </header>

  <!-- URL del bot -->
  <div class="url-bar">
    <label>URL RAILWAY</label>
    <input type="text" id="botUrl" placeholder="https://tu-bot.railway.app" />
    <button class="btn-refresh" onclick="conectar()">Conectar</button>
  </div>

  <!-- Stats -->
  <div class="cards">
    <div class="card">
      <div class="card-label">Precio CNKT</div>
      <div class="card-value blue" id="statPrecio">—</div>
    </div>
    <div class="card">
      <div class="card-label">USDT</div>
      <div class="card-value" id="statUSDT">—</div>
    </div>
    <div class="card">
      <div class="card-label">CNKT</div>
      <div class="card-value" id="statCNKT">—</div>
    </div>
    <div class="card">
      <div class="card-label">Ganancia</div>
      <div class="card-value green" id="statGanancia">—</div>
    </div>
  </div>

  <div class="panels">
    <!-- Config -->
    <div class="panel">
      <h2>Configuración</h2>
      <div class="field">
        <label>Rango Bajo (compra en $)</label>
        <input type="number" id="rangoBajo" placeholder="0.001850" step="0.000001">
      </div>
      <div class="field">
        <label>Rango Alto (vende en $)</label>
        <input type="number" id="rangoAlto" placeholder="0.001901" step="0.000001">
      </div>
      <div class="field">
        <label>Capital USDT</label>
        <input type="number" id="amountUsdt" placeholder="10">
      </div>
      <div class="field">
        <label>Stop Zone (% fuera de rango)</label>
        <input type="number" id="stopZona" placeholder="0.03" step="0.01">
      </div>
      <div class="btn-row">
        <button class="btn-start" id="btnStart" onclick="startBot()">▶ INICIAR</button>
        <button class="btn-stop" id="btnStop" onclick="stopBot()" disabled>■ DETENER</button>
      </div>
      <div class="wallet-addr" id="walletAddr"></div>
    </div>

    <!-- Estado -->
    <div class="panel">
      <h2>Estado</h2>
      <div class="field">
        <label>Modo actual</label>
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;" id="modoActual">—</div>
      </div>
      <div class="field">
        <label>Ciclos completados</label>
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent3);" id="ciclos">—</div>
      </div>
      <div class="field">
        <label>Config activa</label>
        <div style="font-size:12px;color:var(--muted);line-height:1.8;" id="configActiva">Sin datos</div>
      </div>
    </div>
  </div>

  <!-- Logs -->
  <div class="log-panel">
    <div class="log-header">
      <h2>Logs</h2>
      <button class="btn-refresh" onclick="fetchLogs()">↻ Actualizar</button>
    </div>
    <div class="log-box" id="logBox">
      <div class="log-line info">Conecta tu bot para ver los logs...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let botUrl = '';
let interval = null;
let userPassword = '';

function doLogin() {
  const pwd = document.getElementById('passwordInput').value;
  if (!pwd) { document.getElementById('loginError').textContent = 'Ingresa una contraseña'; return; }
  userPassword = pwd;
  // Verify password against bot
  const url = document.getElementById('botUrl') ? 
    (localStorage.getItem('botUrl') || '') : '';
  // Just hide login and show app, password will be verified on first API call
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

function getHeaders() {
  return { 'Content-Type': 'application/json', 'X-Password': userPassword };
}

function getUrl() {
  return document.getElementById('botUrl').value.trim().replace(/\/$/, '');
}

function showToast(msg, tipo = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + tipo;
  setTimeout(() => t.className = 'toast', 3000);
}

async function conectar() {
  botUrl = getUrl();
  if (!botUrl) { showToast('Ingresa la URL del bot', 'err'); return; }
  try {
    const r = await fetch(botUrl + '/status', { headers: getHeaders() });
    if (r.status === 401) { showToast('Contraseña incorrecta', 'err'); return; }
    const data = await r.json();
    actualizarUI(data);
    showToast('Conectado!', 'ok');
    clearInterval(interval);
    interval = setInterval(fetchStatus, 10000);
    fetchLogs();
  } catch(e) {
    showToast('No se pudo conectar: ' + e.message, 'err');
  }
}

async function fetchStatus() {
  botUrl = getUrl();
  if (!botUrl) return;
  try {
    const r = await fetch(botUrl + '/status', { headers: getHeaders() });
    const data = await r.json();
    actualizarUI(data);
  } catch(e) { console.log('Error status:', e); }
}

async function fetchLogs() {
  botUrl = getUrl();
  if (!botUrl) return;
  try {
    const r = await fetch(botUrl + '/logs', { headers: getHeaders() });
    const data = await r.json();
    const box = document.getElementById('logBox');
    box.innerHTML = data.logs.slice().reverse().map(line => {
      let cls = 'log-line';
      if (line.includes('COMPRA')) cls += ' compra';
      else if (line.includes('VENTA')) cls += ' venta';
      else if (line.includes('Error') || line.includes('ERROR')) cls += ' error';
      else if (line.includes('BOT') || line.includes('Conectado')) cls += ' info';
      return '<div class="' + cls + '">' + line + '</div>';
    }).join('');
  } catch(e) { console.log('Error logs:', e); }
}

function actualizarUI(data) {
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  if (data.activo) {
    dot.className = 'dot on';
    statusText.textContent = 'Corriendo';
  } else {
    dot.className = 'dot off';
    statusText.textContent = 'Detenido';
  }

  document.getElementById('statPrecio').textContent = data.precio ? '$' + data.precio : '—';
  document.getElementById('statUSDT').textContent = data.usdt ? '$' + data.usdt : '—';
  document.getElementById('statCNKT').textContent = data.cnkt !== undefined ? data.cnkt : '—';

  const gan = data.ganancia_total;
  const ganEl = document.getElementById('statGanancia');
  ganEl.textContent = gan !== undefined ? '$' + gan.toFixed(4) : '—';
  ganEl.style.color = gan >= 0 ? 'var(--accent)' : 'var(--accent2)';

  const modoEl = document.getElementById('modoActual');
  modoEl.textContent = data.modo || '—';
  modoEl.style.color = data.modo === 'COMPRA' ? 'var(--accent)' : 'var(--accent2)';

  document.getElementById('ciclos').textContent = data.ciclos !== undefined ? data.ciclos : '—';

  if (data.wallet) {
    document.getElementById('walletAddr').textContent = 'Wallet: ' + data.wallet.slice(0,6) + '...' + data.wallet.slice(-4);
  }

  if (data.config && data.config.RANGO_BAJO) {
    const c = data.config;
    document.getElementById('configActiva').innerHTML =
      'Compra: $' + c.RANGO_BAJO + '<br>' +
      'Vende: $' + c.RANGO_ALTO + '<br>' +
      'Capital: $' + c.AMOUNT_USDT + '<br>' +
      'Stop: ' + (c.STOP_ZONA * 100) + '%';
  }

  document.getElementById('btnStart').disabled = data.activo;
  document.getElementById('btnStop').disabled = !data.activo;
}

async function startBot() {
  botUrl = getUrl();
  if (!botUrl) { showToast('Conecta el bot primero', 'err'); return; }

  const rb = parseFloat(document.getElementById('rangoBajo').value);
  const ra = parseFloat(document.getElementById('rangoAlto').value);
  const au = parseFloat(document.getElementById('amountUsdt').value);
  const sz = parseFloat(document.getElementById('stopZona').value) || 0.03;

  if (!rb || !ra || !au) { showToast('Completa todos los campos', 'err'); return; }
  if (rb >= ra) { showToast('Rango bajo debe ser menor al alto', 'err'); return; }

  try {
    const r = await fetch(botUrl + '/start', {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({rango_bajo: rb, rango_alto: ra, amount_usdt: au, stop_zona: sz})
    });
    const data = await r.json();
    if (data.ok) {
      showToast('Bot iniciado!', 'ok');
      setTimeout(fetchStatus, 2000);
    } else {
      showToast(data.msg, 'err');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  }
}

async function stopBot() {
  botUrl = getUrl();
  if (!botUrl) return;
  try {
    const r = await fetch(botUrl + '/stop', { method: 'POST', headers: getHeaders() });
    const data = await r.json();
    showToast(data.msg, data.ok ? 'ok' : 'err');
    setTimeout(fetchStatus, 2000);
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  }
}
</script>
</body>
</html>
